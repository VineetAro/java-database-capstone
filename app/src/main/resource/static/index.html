<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clinic Login</title>
  
  <!-- Favicon (optional) -->
  <link rel="icon" href="./assets/images/favicon.ico" />

  <!-- CSS -->
  <link rel="stylesheet" href="./assets/css/index.css">
  <link rel="stylesheet" href="./assets/css/style.css">

  <!-- Utility JS -->
  <script src="./js/util.js" defer></script>
  <script src="./js/render.js" defer></script>

  <!-- Component JS -->
  <script src="./js/components/header.js" defer></script>
  <script src="./js/components/footer.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

</head>
<body>

<main class="main-content">
  <div class="container">
    <div class="wrapper">
      
      <!-- Header Placeholder -->
      <div id="header"></div>

      <h2>Select Your Role</h2>
      
      <!-- Role Buttons -->
      <button id="adminBtn" onclick="selectRole('admin')">Admin Login</button>
      <button id="doctorBtn" onclick="selectRole('doctor')">Doctor Login</button>
      <button id="patientBtn" onclick="selectRole('patient')">Patient Login</button>

      <!-- Modal (initially hidden) -->
<div id="modal" class="modal hidden">
  <button id="closeModal">Close</button>
  <div id="modal-body"></div>
</div>


      <!-- Footer Placeholder -->
      <div id="footer"></div>

    </div>
  </div>
</main>

<!-- Role Selection Service -->
<script type="module" src="../js/services/index.js" defer></script>

</body>
</html>
